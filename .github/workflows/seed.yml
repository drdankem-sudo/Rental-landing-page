name: Seed Database

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/redesign-visual-dashboards-yJe0Z

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Debug - check generated output
        run: |
          echo "=== Checking generated directory ==="
          ls -la generated/ 2>/dev/null || echo "No generated/ directory"
          ls -la generated/prisma/ 2>/dev/null || echo "No generated/prisma/ directory"
          ls -la node_modules/.prisma/ 2>/dev/null || echo "No .prisma in node_modules"
          ls -la node_modules/@prisma/client/ 2>/dev/null || echo "No @prisma/client"

      - name: Run seed script
        run: node prisma/seed.js
